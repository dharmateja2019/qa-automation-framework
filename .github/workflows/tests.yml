name: QA Automation Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code (only once)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python (only once)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # 3. Install ALL dependencies (API + UI)
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 4. Run API tests (no browser needed)
      - name: Run API tests
        run: pytest my-api-tests/test_api.py -v --html=api-report.html --self-contained-html

      # 5. Install Playwright ONLY before UI tests
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # 6. Run UI tests with Playwright and generate Allure results
      - name: Run UI tests
        env:
          BASE_URL: https://www.saucedemo.com
          DEFAULT_TIMEOUT: "30000"
        run: pytest pom_project/tests/ -v -n auto --browser chromium --alluredir=allure-results

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/

      - name: Install Allure CLI
        if: always()
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

  performance-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run performance tests
        run: k6 run performance/api_load_test.js
